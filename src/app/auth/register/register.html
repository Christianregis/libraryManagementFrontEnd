<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

}

.container{
    width:100%;
    max-width:1000px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

/* IMAGE SECTION */
.image-section{
    flex:1;
    position:relative;
    overflow:hidden;
}

.image-section img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:opacity 1s ease-in-out;
}

.image-section img.active{
    opacity:1;
}

/* INDICATORS */
.indicators{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
}

.indicators span{
    width:12px;
    height:12px;
    border-radius:50%;
    background:rgba(255,255,255,0.6);
    cursor:pointer;
    transition:0.3s;
}

.indicators span.active{
    background:#ffffff;
    transform:scale(1.3);
    box-shadow:0 0 10px rgba(255,255,255,0.8);
}

/* FORM SECTION */
.form-section{
    flex:1;
    padding:50px 40px;
    background:linear-gradient(135deg,#ffffff,#e3f2fd);
}

.form-section h2{
    color:#0d47a1;
    margin-bottom:30px;
    font-weight:600;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
    color:#0d47a1;
    font-weight:500;
}

.input-group input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #bbdefb;
    outline:none;
    transition:0.3s;
}

.input-group input:focus{
    border-color:#1976d2;
    box-shadow:0 0 8px rgba(25,118,210,0.3);
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#1976d2;
    color:white;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#0d47a1;
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(13,71,161,0.3);
}

.login-option{
    margin-top:20px;
    text-align:center;
    font-size:14px;
}

.login-option a{
    color:#1976d2;
    text-decoration:none;
    font-weight:500;
}

.login-option a:hover{
    text-decoration:underline;
}

/* RESPONSIVE */
@media(max-width:900px){
    .container{
        flex-direction:column;
    }
    .image-section{
        height:250px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- IMAGE SLIDER -->
    <div class="image-section">
        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f" class="active">

        <!-- INDICATORS -->
        <div class="indicators">
            <span class="active"></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- FORM -->
    <div class="form-section">
        <h2>Créer un compte</h2>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="input-group">
                <label>Nom Utilisateur</label>
                <input type="text" formControlName="name" required>
            </div>

            <div class="input-group">
                <label>Prénom</label>
                <input type="text" formControlName="prenom" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" formControlName="email" required>
            </div>

            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" formControlName="password" required>
            </div>

            <button type="submit" class="btn">S'inscrire</button>
        </form>

        <div class="login-option">
            Vous avez déjà un compte ? <a [href]="redirectToLogin">Se connecter</a>
        </div>
    </div>

</div>

</body>
</html>
