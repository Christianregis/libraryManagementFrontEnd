<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* Reset & global */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
    }

    body {
      display: flex;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }

    /* Sidebar avec dégradé */
    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, #1e3a8a 0%, #2d5aa8 100%);
      color: white;
      display: flex;
      flex-direction: column;
      padding: 20px;
      box-shadow: 4px 0 15px rgba(0, 0, 0, 0.1);
      border-radius: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .sidebar a {
      color: white;
      text-decoration: none;
      margin: 12px 0;
      padding: 12px 15px;
      border-radius: 12px;
      transition: all 0.3s ease;
      font-weight: 500;
      position: relative;
      overflow: hidden;
    }

    .sidebar a::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .sidebar a:hover {
      background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
      transform: translateX(5px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .sidebar a:hover::before {
      left: 100%;
    }

    /* Main content */
    .main {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .main h1 {
      margin-bottom: 30px;
      color: #1e3a8a;
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Navbar avec dégradé */
    .navbar {
      width: 100%;
      height: 70px;
      background: linear-gradient(135deg, #ffffff 0%, #f0f4f8 100%);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 30px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
      margin-bottom: 30px;
      border-radius: 16px;
    }

    .navbar .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .navbar .user-info img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #3b82f6;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
    }

    .navbar .user-info span {
      font-weight: 600;
      color: #1e3a8a;
      font-size: 15px;
    }

    .navbar .user-info button {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.2);
    }

    .navbar .user-info button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(239, 68, 68, 0.4);
    }

    /* Section titles */
    .section-title {
      font-size: 22px;
      font-weight: 700;
      color: #1e3a8a;
      margin: 30px 0 20px 0;
      padding-bottom: 10px;
      border-bottom: 3px solid transparent;
      background: linear-gradient(90deg, #1e3a8a 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Totals cards avec dégradés */
    .totals {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    .total-card {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      padding: 25px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
      border: 1px solid rgba(59, 130, 246, 0.1);
      position: relative;
      overflow: hidden;
    }

    .total-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
      border-radius: 16px 16px 0 0;
    }

    .total-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 30px rgba(59, 130, 246, 0.2);
    }

    .total-card h3 {
      margin-bottom: 15px;
      color: #1e3a8a;
      font-size: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .total-card p {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 40px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.1);
    }

    table th,
    table td {
      padding: 16px 18px;
      text-align: left;
    }

    table th {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      color: white;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 13px;
    }

    table tr {
      transition: all 0.3s ease;
      border-bottom: 1px solid rgba(59, 130, 246, 0.1);
    }

    table tr:hover {
      background: linear-gradient(90deg, rgba(59, 130, 246, 0.05) 0%, rgba(139, 92, 246, 0.05) 100%);
    }

    table tr:last-child {
      border-bottom: none;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .action-buttons button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .btn-edit {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.2);
    }

    .btn-edit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
    }

    .btn-delete {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.2);
    }

    .btn-delete:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(239, 68, 68, 0.4);
    }

    /* Responsive */
    @media(max-width: 768px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        flex-direction: row;
        overflow-x: auto;
        padding: 15px;
      }

      .sidebar h2 {
        margin-right: 20px;
        margin-bottom: 0;
        white-space: nowrap;
      }

      .sidebar a {
        flex: 1;
        text-align: center;
        margin: 0 5px;
        min-width: 100px;
      }

      .main {
        padding: 20px;
      }

      .navbar {
        flex-direction: column;
        height: auto;
        padding: 15px;
        gap: 10px;
        margin-bottom: 20px;
      }

      .totals {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .total-card {
        padding: 20px;
      }

      .total-card p {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Library Manager</h2>
    <a [href]="goToHomeAdmin">Totaux</a>
    <a [href]="goToUsersPage">Utilisateurs</a>
    <a [href]="goToBooksPage">Livres</a>
    <a [href]="goToCategoryPage">Catégories</a>
    <a [href]="goToBorrowsPage">Emprunts</a>
  </div>

  <!-- Main content -->
  <div class="main">
    <!-- Navbar -->
    <div class="navbar">
      <div class="user-info">
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="User Logo">
        <span>{{ user?.name }} {{ user?.prenom }}</span>
        <button (click)="logout()">Déconnexion</button>
      </div>
    </div>

    <h1>Gestionnaires de Categories</h1>

    <!-- Users Table -->
    <h2 class="section-title" id="users">Categories</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nom</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let category of categories">
          <td>#</td>
          <td>{{ category.name }}</td>
          <td class="action-buttons">
            <button class="btn-edit">Modifier</button>
            <button class="btn-delete">Supprimer</button>
          </td>
        </tr>
      </tbody>
    </table>

  </div>
</body>

</html>
